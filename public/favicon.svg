<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#grad)" />
  <!-- < bracket -->
  <text x="4" y="44" font-family="Georgia, serif" font-size="28" font-weight="900" fill="white" opacity="0.95">&lt;</text>
  <!-- V letter -->
  <text x="20" y="44" font-family="Georgia, serif" font-size="26" font-weight="700" fill="white">V</text>
  <!-- /> bracket -->
  <text x="38" y="44" font-family="Georgia, serif" font-size="22" font-weight="900" fill="white" opacity="0.95">/&gt;</text>
</svg>
